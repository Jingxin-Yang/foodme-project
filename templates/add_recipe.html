{% extends 'base.html' %}

{% block title %}Add New Recipe - FoodMe{% endblock %}

{% block content %}
<div class="row justify-content-center mb-5">
    <div class="col-lg-8 col-md-10">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0">Create New Recipe</h2>
                <p class="text-muted">Share your delicious creation with the world.</p>
            </div>
            <a href="{% url 'recipes' %}" class="btn btn-outline-secondary fw-bold">Cancel</a>
        </div>

        <div class="card shadow-sm border-0 p-4 p-md-5">
            <form id="addRecipeForm">
                
                <h5 class="fw-bold border-bottom pb-2 mb-4" style="color: var(--fm-primary);">Basic Info</h5>
                
                <div class="mb-4">
                    <label class="form-label fw-bold text-muted small text-uppercase">Recipe Title <span class="text-danger">*</span></label>
                    <input type="text" class="form-control form-control-lg bg-light border-0" placeholder="e.g. Spicy Thai Basil Chicken" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold text-muted small text-uppercase">Description</label>
                    <textarea class="form-control bg-light border-0" rows="3" placeholder="A short description of this dish..."></textarea>
                </div>

                <div class="row g-3 mb-5">
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Prep Time (min)</label>
                        <input type="number" class="form-control bg-light border-0" placeholder="15">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Cook Time (min)</label>
                        <input type="number" class="form-control bg-light border-0" placeholder="20">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-muted small text-uppercase">Servings</label>
                        <input type="number" class="form-control bg-light border-0" placeholder="4">
                    </div>
                </div>

                <h5 class="fw-bold border-bottom pb-2 mb-4" style="color: var(--fm-primary);">Ingredients</h5>
                
                <div id="ingredientsContainer" class="mb-3">
                    <div class="d-flex gap-2 mb-2 ingredient-row transition-all">
                        <input type="text" class="form-control bg-light border-0 w-25" placeholder="Amount (e.g. 2)">
                        <input type="text" class="form-control bg-light border-0 w-25" placeholder="Unit (e.g. lbs)">
                        <input type="text" class="form-control bg-light border-0 w-50" placeholder="Ingredient (e.g. Chicken Breast)">
                        <button type="button" class="btn btn-outline-danger border-0 remove-row-btn" title="Remove" disabled>✕</button>
                    </div>
                </div>
                
                <button type="button" id="addIngredientBtn" class="btn btn-outline-secondary btn-sm fw-bold rounded-pill px-3 mb-5">
                    + Add Ingredient
                </button>

                <h5 class="fw-bold border-bottom pb-2 mb-4" style="color: var(--fm-primary);">Instructions</h5>
                
                <div id="stepsContainer" class="mb-3">
                    <div class="d-flex gap-3 mb-3 step-row transition-all align-items-start">
                        <div class="step-number bg-dark text-white rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 mt-1" style="width: 32px; height: 32px; font-weight: bold;">1</div>
                        <textarea class="form-control bg-light border-0 flex-grow-1" rows="2" placeholder="Describe this step..."></textarea>
                        <button type="button" class="btn btn-outline-danger border-0 remove-row-btn mt-1" title="Remove" disabled>✕</button>
                    </div>
                </div>

                <button type="button" id="addStepBtn" class="btn btn-outline-secondary btn-sm fw-bold rounded-pill px-3 mb-5">
                    + Add Step
                </button>

                <hr class="mb-4">
                <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm" style="background-color: var(--fm-primary); border: none;">
                    SAVE RECIPE
                </button>

            </form>
        </div>
    </div>
</div>
{% endblock %}
