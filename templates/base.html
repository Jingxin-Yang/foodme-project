<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FoodMe{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js library for Analytics page real charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <!-- Favicon (browser tab icon) and custom styles -->
    {% load static %}
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <!-- ====== Top Navigation Bar ====== -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <!-- Logo image -->
            <a class="navbar-brand d-flex align-items-center" href="{% url 'dashboard' %}">
                <img src="{% static 'img/logo.png' %}" alt="FoodMe Logo" height="32">
            </a>

            <!-- Mobile hamburger menu toggle -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- Navigation links with active state highlighting.
                     Django's request.resolver_match.url_name gives the current page's URL name.
                     If it matches, the 'active' class is added (styled with green underline in CSS). -->
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">DASHBOARD</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'recipes' or request.resolver_match.url_name == 'recipe_detail' or request.resolver_match.url_name == 'add_recipe' %}active{% endif %}" href="{% url 'recipes' %}">RECIPES</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'meal_planner' %}active{% endif %}" href="{% url 'meal_planner' %}">MEAL PLANNER</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'shopping_list' %}active{% endif %}" href="{% url 'shopping_list' %}">SHOPPING LIST</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'analytics' %}active{% endif %}" href="{% url 'analytics' %}">ANALYTICS</a>
                    </li>
                </ul>

                <!-- User avatar dropdown menu -->
                <div class="nav-item dropdown d-flex align-items-center ms-3">
                    <a class="nav-link dropdown-toggle d-flex align-items-center text-decoration-none" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="rounded-circle px-2 py-1 text-white fw-bold" style="background-color: var(--fm-primary);">U</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="userDropdown">
                        <li><span class="dropdown-item-text text-muted small">Signed in as User</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2" href="{% url 'profile' %}">👤 Profile & Settings</a></li>
                        <li><a class="dropdown-item py-2" href="{% url 'dashboard' %}">📊 My Dashboard</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger" href="{% url 'login' %}">🚪 Sign out</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hidden live region for screen readers (WCAG 2.2 SC 4.1.3 - Status Messages).
         JS pushes text here when dynamic actions occur (e.g. "3 of 13 items checked").
         Assistive technology reads it aloud without shifting visual focus. -->
    <div id="statusAnnouncer" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

    <!-- ====== Main Content Area ====== -->
    <main class="container mt-4">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Application JavaScript (all page interactions) -->
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
